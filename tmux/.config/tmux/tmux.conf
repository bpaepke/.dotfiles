# tmux(1) configuration
#
# Design goals:
# - Fast, predictable defaults (vi keys, sane indexing, big history).
# - Ergonomic keybinds (C-a prefix, easy splits, quick reload).
# - Optional batteries via TPM (plugins), but stays usable without it.

##### Prefix / timings
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g escape-time 10
set -g repeat-time 300

##### Indexing / naming
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g allow-rename off
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

##### Quality-of-life
set -g mouse on
set -g focus-events on
set -g history-limit 100000
set -g set-clipboard on

##### Terminal / colors
# Prefer `tmux-256color` if your system has it; otherwise use `screen-256color`.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

##### Splits / new windows start in the current directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### Pane navigation / resizing
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### Status line (simple + readable)
set -g status on
set -g status-interval 5
set -g status-style "bg=default,fg=colour7"
set -g message-style "bg=default,fg=colour11"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour45"

set -g status-left-length 60
set -g status-right-length 120
set -g status-left "#[fg=colour45,bold] #S #[default]#[fg=colour8]|#[default] #(whoami)@#H #[fg=colour8]|#[default]"
set -g status-right "#[fg=colour8]%Y-%m-%d %H:%M #[default]"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour0,bg=colour45,bold] #I:#W #[default]"

##### Reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded ~/.config/tmux/tmux.conf"

##### Optional: TPM plugins (safe if TPM is missing)
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"

set -g @continuum-restore "on"

if-shell '[ -d "$HOME/.tmux/plugins/tpm" ]' 'run "$HOME/.tmux/plugins/tpm/tpm"'
